<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <title>Simulation Vélo - Caméra Suiveuse</title>
  </head>
  <body>
    <div id="controls">
      <label
        >Vitesse :
        <input type="range" id="speed" min="-5" max="10" step="0.1" value="0" />
      </label>
      <span id="speedValue">0</span>
      <br /><br />
      <label
        >Angle roue avant :
        <input
          type="range"
          id="steering"
          min="-45"
          max="45"
          step="1"
          value="0"
        />
      </label>
      <span id="steeringValue">0</span>°
    </div>
    <canvas id="canvas"></canvas>
    <script src="app.js"></script>
  </body>
</html>
